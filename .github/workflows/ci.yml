name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ocr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]

    env:
      OCR_ENV: dev
      OCR_DATABASE_URL: postgresql+asyncpg://ocr_app:changeme_in_production@localhost:5432/ocr
      OCR_MIGRATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ocr
      OCR_QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: mypy
        run: mypy app

      - name: Apply migrations
        run: alembic -c migrations/alembic.ini upgrade head

      - name: Tests (unit + integration)
        run: pytest --cov=app --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/Dockerfile -t ocr-service:ci .
