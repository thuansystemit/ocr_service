# Dev stack: Postgres 16 + Qdrant + API + worker.
# `make up` builds and starts everything. The `migrate` one-shot service runs
# Alembic to head before API/worker start (they depend on it completing).

name: ocr-service

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ocr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ocr"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    command: ["alembic", "-c", "migrations/alembic.ini", "upgrade", "head"]
    environment:
      OCR_MIGRATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ocr
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      OCR_ENV: dev
      OCR_DATABASE_URL: postgresql+asyncpg://ocr_app:changeme_in_production@postgres:5432/ocr
      OCR_QDRANT_URL: http://qdrant:6333
      # Optional provider keys: export them on the host before `up` to enable
      # real LLM extraction / cloud parsing. Empty = local/degraded behaviour.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY:-}
      OCR_PARSER_BACKEND: ${OCR_PARSER_BACKEND:-local}
      OCR_PII_ENCRYPTION_KEY: ${OCR_PII_ENCRYPTION_KEY:-}
      # LLM provider selection. For a local Ollama on the host, set:
      #   OCR_LLM_PROVIDER=ollama  OCR_EMBEDDING_PROVIDER=ollama
      #   OCR_OLLAMA_BASE_URL=http://host.docker.internal:11434
      OCR_LLM_PROVIDER: ${OCR_LLM_PROVIDER:-anthropic}
      OCR_LLM_PRIMARY_MODEL: ${OCR_LLM_PRIMARY_MODEL:-claude-sonnet-4-6}
      OCR_LLM_FALLBACK_PROVIDER: ${OCR_LLM_FALLBACK_PROVIDER:-openai}
      OCR_LLM_FALLBACK_MODEL: ${OCR_LLM_FALLBACK_MODEL:-gpt-4o}
      OCR_EMBEDDING_PROVIDER: ${OCR_EMBEDDING_PROVIDER:-openai}
      OCR_OLLAMA_BASE_URL: ${OCR_OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: runtime
    command: ["python", "-m", "app.worker"]
    environment:
      OCR_ENV: dev
      OCR_DATABASE_URL: postgresql+asyncpg://ocr_app:changeme_in_production@postgres:5432/ocr
      OCR_QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY:-}
      OCR_PARSER_BACKEND: ${OCR_PARSER_BACKEND:-local}
      OCR_PII_ENCRYPTION_KEY: ${OCR_PII_ENCRYPTION_KEY:-}
      # LLM provider selection. For a local Ollama on the host, set:
      #   OCR_LLM_PROVIDER=ollama  OCR_EMBEDDING_PROVIDER=ollama
      #   OCR_OLLAMA_BASE_URL=http://host.docker.internal:11434
      OCR_LLM_PROVIDER: ${OCR_LLM_PROVIDER:-anthropic}
      OCR_LLM_PRIMARY_MODEL: ${OCR_LLM_PRIMARY_MODEL:-claude-sonnet-4-6}
      OCR_LLM_FALLBACK_PROVIDER: ${OCR_LLM_FALLBACK_PROVIDER:-openai}
      OCR_LLM_FALLBACK_MODEL: ${OCR_LLM_FALLBACK_MODEL:-gpt-4o}
      OCR_EMBEDDING_PROVIDER: ${OCR_EMBEDDING_PROVIDER:-openai}
      OCR_OLLAMA_BASE_URL: ${OCR_OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Lint + type-check + unit/integration tests against the real Postgres.
  # Behind the `test` profile so it never starts on `make up`.
  #   docker compose -f deploy/docker-compose.yml --profile test run --rm test
  test:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: test
    profiles: ["test"]
    environment:
      OCR_ENV: dev
      OCR_DATABASE_URL: postgresql+asyncpg://ocr_app:changeme_in_production@postgres:5432/ocr
      OCR_MIGRATION_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ocr
      OCR_QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        set -e
        ruff check app tests
        ruff format --check app tests
        mypy app
        pytest -ra --cov=app --cov-report=term-missing

  # Local LLM (offline, no cloud keys). Behind the `ollama` profile so it only
  # starts when you ask for it:
  #   docker compose -f deploy/docker-compose.yml --profile ollama up -d --build
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: pull the chat + embedding models into the ollama volume, then exit.
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama pull ${OCR_LLM_PRIMARY_MODEL:-llama3.2} &&
        ollama pull ${OCR_OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    restart: "no"

volumes:
  pgdata:
  qdrantdata:
  ollamadata:
