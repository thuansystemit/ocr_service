apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-api
  namespace: ocr-service
  labels: { app.kubernetes.io/name: ocr-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: ocr-api }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ocr-api }
    spec:
      containers:
        - name: api
          image: ocr-service:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: ocr-config }
            - secretRef: { name: ocr-secrets }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-api
  namespace: ocr-service
spec:
  selector: { app.kubernetes.io/name: ocr-api }
  ports:
    - port: 80
      targetPort: 8000
