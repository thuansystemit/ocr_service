apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
  namespace: ocr-service
  labels: { app.kubernetes.io/name: ocr-worker }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: ocr-worker }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ocr-worker }
    spec:
      containers:
        - name: worker
          image: ocr-service:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker"]
          envFrom:
            - configMapRef: { name: ocr-config }
            - secretRef: { name: ocr-secrets }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "2Gi" }
